<body data-cms-page="contact">

    <h1 style="text-align:center;">Contact Us</h1>
    <form class="card" style="margin-top:40px;">
      <div class="input-group">
        <label class="input-label">Name</label>
        <input type="text" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
      </div>
      <div class="input-group">
        <label class="input-label">Email</label>

      </div>
      <div class="input-group">
        <label class="input-label">Message</label>
        <textarea style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; height:100px;"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;">Send Message</button>
