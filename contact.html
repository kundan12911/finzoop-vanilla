<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Finzoop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container nav-container">
      <a href="index.html" class="logo">Fin<span>zoop</span></a>
      <button class="hamburger">☰</button>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
    </div>
  </header>
  <div class="container" style="padding-top: 120px; max-width: 600px;">
    <h1 style="text-align:center;">Contact Us</h1>
    <form class="card" style="margin-top:40px;">
      <div class="input-group">
        <label class="input-label">Name</label>
        <input type="text" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
      </div>
      <div class="input-group">
        <label class="input-label">Email</label>
        <input type="email" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px;">
      </div>
      <div class="input-group">
        <label class="input-label">Message</label>
        <textarea style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; height:100px;"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;">Send Message</button>
    </form>
  </div>
  <script src="main.js"></script>
</body>
</html>
