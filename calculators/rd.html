<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RD Calculator - Recurring Deposit Calculator Online | Finzoop</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header"><div class="container nav-container"><a href="../index.html" class="logo">Fin<span>zoop</span></a></div></header>
  <div class="container" style="padding-top: 120px;">
    <h1 style="text-align: center; margin-bottom: 40px;">Recurring Deposit (RD) Calculator</h1>
    <div class="calc-container">
      <div class="card">
        <div class="input-group">
          <div class="input-header"><label class="input-label">Monthly Investment</label>
          <div class="number-input-wrap"><span>₹</span><input type="text" class="sync-input" data-sync="rd-amt" value="5000"></div></div>
          <div class="range-slider"><input type="range" class="sync-range" data-sync="rd-amt" min="500" max="100000" step="500" value="5000"></div>
        </div>
        <div class="input-group">
          <div class="input-header"><label class="input-label">Interest Rate (% p.a)</label>
          <div class="number-input-wrap"><input type="text" class="sync-input" data-sync="rd-rate" value="7.5" style="padding-left:12px;"><span style="left:auto;right:12px;">%</span></div></div>
          <div class="range-slider"><input type="range" class="sync-range" data-sync="rd-rate" min="3" max="12" step="0.1" value="7.5"></div>
        </div>
        <div class="input-group">
          <div class="input-header"><label class="input-label">Time Period (Years)</label>
          <div class="number-input-wrap"><input type="text" class="sync-input" data-sync="rd-years" value="5" style="padding-left:12px;"><span style="left:auto;right:12px;">Yr</span></div></div>
          <div class="range-slider"><input type="range" class="sync-range" data-sync="rd-years" min="1" max="10" step="1" value="5"></div>
        </div>
      </div>
      <div class="result-card">
        <div class="result-row"><div class="result-label">Invested Amount</div><div class="result-val" id="res-inv">₹0</div></div>
        <div class="result-row"><div class="result-label">Estimated Returns</div><div class="result-val" id="res-ret" style="color:var(--secondary);">₹0</div></div>
        <div class="result-row" style="border-bottom:none; margin-top:8px;"><div class="result-label" style="font-weight:700;">Total Maturity Value</div><div class="result-val highlight" id="res-total">₹0</div></div>
        <div class="chart-container"><canvas id="rdChart"></canvas></div>
      </div>
    </div>
  </div>
  <script src="../main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let chart;
      function calculate() {
        const P = parseFloat(document.querySelector('.sync-range[data-sync="rd-amt"]').value);
        const rAnnual = parseFloat(document.querySelector('.sync-range[data-sync="rd-rate"]').value) / 100;
        const years = parseFloat(document.querySelector('.sync-range[data-sync="rd-years"]').value);
        
        const n = years * 12; // total months
        const r = rAnnual / 4; // quarterly compounded interest rate
        
        let A = 0;
        for (let i = 1; i <= n; i++) {
            let quarters = (n - i + 1) / 3;
            A += P * Math.pow(1 + r, quarters);
        }

        const inv = P * n;
        const ret = A - inv;

        document.getElementById('res-inv').innerText = window.formatReadableINR(inv);
        document.getElementById('res-ret').innerText = window.formatReadableINR(ret);
        document.getElementById('res-total').innerText = window.formatReadableINR(A);

        if (chart) { chart.data.datasets[0].data = [inv, ret]; chart.update(); }
        else {
          const ctx = document.getElementById('rdChart').getContext('2d');
          chart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Principal', 'Interest'], datasets: [{ data: [inv, ret], backgroundColor: ['#1B4FD8', '#00C896'], borderWidth:0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins:{legend:{position:'bottom'}} } });
        }
      }
      window.calcUpdateCallbacks.push(calculate); calculate();
    });
  </script>
</body>
</html>
