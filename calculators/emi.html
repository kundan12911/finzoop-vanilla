<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMI Calculator - Personal, Home & Car Loan EMI | Finzoop</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    window.CONTENTFUL_SPACE_ID       = 'tabc1qgaltm6';
    window.CONTENTFUL_ACCESS_TOKEN   = 'VCpSt0x-mm6pOncY1cYlkkuU5b9UsD_cs_mINwRgs6I';
    window.CONTENTFUL_PREVIEW_TOKEN  = 'Y3V82ept2t018xmuDJfyAf2Da86iZSsntizHFKwHmhk';
  </script>
  <script src="/cms.js" defer></script>
  <script src="/cms-preview.js" defer></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-cms-page="emi">
  <header class="header"><div class="container nav-container"><a href="../index.html" class="logo">Fin<span>zoop</span></a></div></header>
  <div class="container" style="padding-top: 120px;" data-cms="calculator-meta" data-cms-slug="emi-calculator">
    <h1 style="text-align: center; margin-bottom: 40px;">EMI Calculator</h1>
    <div class="calc-container">
      <div class="card">
        <div class="input-group">
          <div class="input-header"><label class="input-label">Loan Amount</label>
          <div class="number-input-wrap"><span>&#8377;</span><input type="text" class="sync-input" data-sync="emi-amt" value="5000000"></div></div>
          <div class="range-slider"><input type="range" class="sync-range" data-sync="emi-amt" min="100000" max="50000000" step="100000" value="5000000"></div>
        </div>
        <div class="input-group">
          <div class="input-header"><label class="input-label">Interest Rate (% p.a)</label>
          <div class="number-input-wrap"><input type="text" class="sync-input" data-sync="emi-rate" value="8.5" style="padding-left:12px; padding-right:28px;"><span style="left:auto;right:12px;">%</span></div></div>
          <div class="range-slider"><input type="range" class="sync-range" data-sync="emi-rate" min="5" max="25" step="0.1" value="8.5"></div>
        </div>
        <div class="input-group">
          <div class="input-header"><label class="input-label">Loan Tenure (Years)</label>
          <div class="number-input-wrap"><input type="text" class="sync-input" data-sync="emi-years" value="20" style="padding-left:12px; padding-right:32px;"><span style="left:auto;right:12px;">Yr</span></div></div>
          <div class="range-slider"><input type="range" class="sync-range" data-sync="emi-years" min="1" max="30" step="1" value="20"></div>
        </div>
      </div>
      <div class="result-card">
        <div class="result-row" style="margin-bottom:8px; display:block;">
          <div class="result-label" style="text-align:center; font-size:16px;">Equated Monthly Instalment (EMI)</div>
          <div class="result-val highlight" id="res-emi" style="font-size:36px; text-align:center; display:block; margin-top:8px;">&#8377;0</div>
        </div>
        <div class="result-row"><div class="result-label">Principal Amount</div><div class="result-val" id="res-inv">&#8377;0</div></div>
        <div class="result-row"><div class="result-label">Total Interest Paid</div><div class="result-val" id="res-int" style="color:var(--accent);">&#8377;0</div></div>
        <div class="result-row"><div class="result-label" style="font-weight:700;">Total Amount Payable</div><div class="result-val" id="res-total">&#8377;0</div></div>
        <div class="chart-container"><canvas id="emiChart"></canvas></div>
      </div>
    </div>
  </div>
  <script src="../main.js"></script>
  <script>if(window.lucide){lucide.createIcons();}</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let chart;
      function calculate() {
        const P = parseFloat(document.querySelector('.sync-range[data-sync="emi-amt"]').value);
        const r = parseFloat(document.querySelector('.sync-range[data-sync="emi-rate"]').value) / 12 / 100;
        const n = parseFloat(document.querySelector('.sync-range[data-sync="emi-years"]').value) * 12;
        
        const emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        const total = emi * n;
        const interest = total - P;

        document.getElementById('res-emi').innerText = window.formatINR(emi);
        document.getElementById('res-inv').innerText = window.formatReadableINR(P);
        document.getElementById('res-int').innerText = window.formatReadableINR(interest);
        document.getElementById('res-total').innerText = window.formatReadableINR(total);

        if (chart) { chart.data.datasets[0].data = [P, interest]; chart.update(); }
        else {
          const ctx = document.getElementById('emiChart').getContext('2d');
          chart = new Chart(ctx, { type: 'pie', data: { labels: ['Principal Loan', 'Total Interest'], datasets: [{ data: [P, interest], backgroundColor: ['#0F172A', '#FF6B35'], borderWidth:0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{position:'bottom'}} } });
        }
      }
      window.calcUpdateCallbacks.push(calculate); calculate();
    });
  </script>
</body>
</html>
