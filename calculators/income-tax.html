<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income Tax Calculator FY 2025-26 | Old vs New Tax Regime | Finzoop</title>
  <meta name="description" content="Calculate your income tax for FY 2025-26. Compare old and new tax regime. Free income tax calculator with deductions for India.">
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header"><div class="container nav-container"><a href="../index.html" class="logo">Fin<span>zoop</span></a></div></header>
  <div class="container" style="padding-top: 120px;">
    <h1 style="text-align: center; margin-bottom: 40px;">Income Tax Calculator (FY 2025-26)</h1>
    <div class="calc-container" style="grid-template-columns: 1fr 1fr;">
      
      <!-- Inputs -->
      <div class="card">
        <h3 style="margin-bottom: 24px;">Income & Deductions</h3>
        <div class="input-group">
          <label class="input-label" style="display:block; margin-bottom:8px;">Annual Gross Salary (₹)</label>
          <input type="number" id="tax-income" value="1500000" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
        </div>
        <div style="font-size: 12px; font-weight: 700; color:var(--text-secondary); margin: 24px 0 16px;">OLD REGIME DEDUCTIONS (Optional)</div>
        <div class="input-group">
          <label class="input-label" style="display:block; margin-bottom:8px;">Section 80C (EPF, PPF, ELSS) (Max ₹1.5L)</label>
          <input type="number" id="tax-80c" value="150000" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
        </div>
        <div class="input-group">
          <label class="input-label" style="display:block; margin-bottom:8px;">Section 80D (Health Insurance) (Max ₹75K)</label>
          <input type="number" id="tax-80d" value="25000" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
        </div>
        <div class="input-group">
          <label class="input-label" style="display:block; margin-bottom:8px;">HRA Exemption / 80CCD / 24B</label>
          <input type="number" id="tax-other" value="0" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
        </div>
      </div>

      <!-- Results -->
      <div class="card" style="background: var(--light-bg); border: 2px solid var(--primary);">
        <h3 style="margin-bottom: 24px; text-align:center;">Tax Comparison</h3>
        
        <div style="display: flex; gap: 20px; text-align: center; margin-bottom: 30px;">
          <div style="flex: 1; padding: 16px; background: #fff; border-radius: 12px; border: 1px solid var(--border);">
            <div style="font-weight: 700; color: var(--text-secondary); font-size: 14px; margin-bottom: 8px;">NEW REGIME</div>
            <div id="new-tax" style="font-size: 28px; font-weight: 800; color: var(--primary);">₹0</div>
            <div id="new-taxable" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">Taxable: ₹0</div>
          </div>
          <div style="flex: 1; padding: 16px; background: #fff; border-radius: 12px; border: 1px solid var(--border);">
            <div style="font-weight: 700; color: var(--text-secondary); font-size: 14px; margin-bottom: 8px;">OLD REGIME</div>
            <div id="old-tax" style="font-size: 28px; font-weight: 800; color: var(--text-primary);">₹0</div>
            <div id="old-taxable" style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">Taxable: ₹0</div>
          </div>
        </div>

        <div id="recommendation" style="padding: 16px; background: rgba(0, 200, 150, 0.1); border-radius: 8px; color: var(--secondary); font-weight: 700; text-align: center; margin-bottom: 24px;"></div>

        <div class="chart-container" style="height: 200px;">
          <canvas id="taxChart"></canvas>
        </div>
      </div>
    </div>
  </div>
  <script src="../main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let chart;
      function calcNewTax(income) {
        // Standard Deduction 75K in FY25-26
        let taxable = Math.max(0, income - 75000);
        let tax = 0;
        let rem = taxable;
        const slabs = [[400000, 0], [400000, 0.05], [400000, 0.1], [400000, 0.15], [400000, 0.2], [400000, 0.25], [Infinity, 0.3]];
        for(let [w, r] of slabs) { if(rem <= 0) break; let cur = Math.min(rem, w); tax += cur * r; rem -= cur; }
        // 87A rebate for new regime (Taxable up to 12L is zero effectively)
        if (taxable <= 1200000) tax = 0;
        return { taxable, tax: tax * 1.04 }; // with cess
      }
      function calcOldTax(income, d80c, d80d, other) {
        // Standard Deduction 50K in old
        let deductions = 50000 + Math.min(d80c, 150000) + d80d + other;
        let taxable = Math.max(0, income - deductions);
        let tax = 0;
        let rem = taxable;
        const slabs = [[250000, 0], [250000, 0.05], [500000, 0.2], [Infinity, 0.3]];
        for(let [w, r] of slabs) { if(rem <= 0) break; let cur = Math.min(rem, w); tax += cur * r; rem -= cur; }
        if (taxable <= 500000) tax = 0;
        return { taxable, tax: tax * 1.04 };
      }

      function update() {
        const income = parseFloat(document.getElementById('tax-income').value) || 0;
        const d80c = parseFloat(document.getElementById('tax-80c').value) || 0;
        const d80d = parseFloat(document.getElementById('tax-80d').value) || 0;
        const other = parseFloat(document.getElementById('tax-other').value) || 0;

        const resNew = calcNewTax(income);
        const resOld = calcOldTax(income, d80c, d80d, other);

        document.getElementById('new-tax').innerText = window.formatINR(resNew.tax);
        document.getElementById('new-taxable').innerText = "Taxable: " + window.formatINR(resNew.taxable);
        document.getElementById('old-tax').innerText = window.formatINR(resOld.tax);
        document.getElementById('old-taxable').innerText = "Taxable: " + window.formatINR(resOld.taxable);

        const rec = document.getElementById('recommendation');
        if (resNew.tax < resOld.tax) {
          rec.innerText = `💡 New Regime saves you ${window.formatINR(resOld.tax - resNew.tax)}`;
          rec.style.color = '#1B4FD8'; rec.style.background = 'rgba(27,79,216,0.1)';
        } else if (resOld.tax < resNew.tax) {
          rec.innerText = `💡 Old Regime saves you ${window.formatINR(resNew.tax - resOld.tax)}`;
          rec.style.color = '#00C896'; rec.style.background = 'rgba(0,200,150,0.1)';
        } else {
          rec.innerText = `Both Regimes result in same tax.`;
        }

        if (chart) { chart.data.datasets[0].data = [resNew.tax, resOld.tax]; chart.update(); }
        else {
          chart = new Chart(document.getElementById('taxChart').getContext('2d'), { type: 'bar', data: { labels: ['New Regime', 'Old Regime'], datasets: [{ label: 'Total Tax', data: [resNew.tax, resOld.tax], backgroundColor: ['#1B4FD8', '#0F172A'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        }
      }
      document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
      update();
    });
  </script>
</body>
</html>
