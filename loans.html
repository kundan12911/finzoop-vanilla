<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loans | Finzoop</title>
  <link rel="stylesheet" href="style.css">
  <script>
    window.STRAPI_URL = 'https://finzoop-strapi.onrender.com/api';

<body data-cms-page="loans" data-product-page="loans">

  <div class="container" style="padding-top: 120px;" data-cms="page-seo" data-cms-slug="loans-page">

      <a href="index.html">Home</a><span class="separator">›</span><span aria-current="page">Loans</span>
